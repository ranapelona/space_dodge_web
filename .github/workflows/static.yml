name: Deploy Space Dodge to Pages

on:
  push:
    branches: ["main"] # Or "master" if that is your branch name

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python and Pygbag
        run: |
          python -m pip install pygbag

      - name: Build Web Version
        run: |
          python -m pygbag --build .

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4